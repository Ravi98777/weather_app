 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      box-sizing: border-box;
    }
    body {
      background: #000;
    }
    .card {
      width: 90%;
      max-width: 470px;
      background: linear-gradient(135deg, #00feba, #5b548a);
      color: #fff;
      margin: 100px auto 0;
      border-radius: 20px;
      padding: 30px 35px;
      text-align: center;
    }
    .search {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .search input {
      border: 0;
      outline: 0;
      background: #ebfffc;
      color: #5b5959;
      padding: 5px 25px;
      height: 48px;
      border-radius: 30px;
      flex: 1;
      margin-right: 16px;
      font-size: 18px;
    }
    .search button {
      border: 0;
      outline: 0;
      background: #ebfffc;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      cursor: pointer;
    }
    .search button img {
      width: 20px;
    }
    .weathericon {
      width: 170px;
      margin-top: 30px;
    }
    .weather h1 {
      font-size: 80px;
      font-weight: 500;
    }
    .weather h2 {
      font-size: 45px;
      font-weight: 400;
      margin-top: -10px;
    }
    .details {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 50px;
      padding: 0 20px;
    }
    .col {
      display: flex;
      align-items: center;
      text-align: left;
    }
    .col img {
      width: 40px;
      margin-right: 10px;
    }
    .humidity,
    .wind {
      font-size: 20px;
      margin-top: -6px;
      font-family: Verdana, Geneva, Tahoma, sans-serif;
    }
    .weather {
      display: none;
    }
    .error {
      text-align: left;
      margin-left: 10px;
      font-size: 14px;
      margin-top: 10px;
      display: none;
      color: #ffdede;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="search">
      <input type="text" placeholder="Enter city name" spellcheck="false" />
      <button><img src="search.png" alt="Search Icon" /></button>
    </div>
    <div class="error">
      <p>Invalid city name.</p>
    </div>
    <div class="weather">
      <img src="default.png" class="weathericon" alt="Weather Icon" />
      <h1 class="temp">22°C</h1>
      <h2 class="city">City</h2>
      <div class="details">
        <div class="col">
          <img src="humidity.png" alt="Humidity Icon" />
          <div>
            <p class="humidity">50%</p>
            <p>Humidity</p>
          </div>
        </div>
        <div class="col">
          <img src="wind.png" alt="Wind Icon" />
          <div>
            <p class="wind">15 km/h</p>
            <p>Wind Speed</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const apikey = "b525ebed4048e660275daed0c44c6161";
    const apiurl = "https://api.openweathermap.org/data/2.5/weather?units=metric&q=";
    const searchbox = document.querySelector(".search input");
    const searchbtn = document.querySelector(".search button");
    const weatherIcon = document.querySelector(".weathericon");

    async function checkweather(city) {
      try {
        const response = await fetch(apiurl + city + `&appid=${apikey}`);
        if (response.status == 404) {
          document.querySelector(".error").style.display = "block";
          document.querySelector(".weather").style.display = "none";
          return;
        }
        const data = await response.json();

        document.querySelector(".city").innerHTML = data.name;
        document.querySelector(".temp").innerHTML = Math.round(data.main.temp) + "°C";
        document.querySelector(".humidity").innerHTML = data.main.humidity + "%";
        document.querySelector(".wind").innerHTML = data.wind.speed + " km/h";
        console.log(data);
        // Set weather icon based on weather condition
        switch (data.weather[0].main) {
          case "Clouds":
            weatherIcon.src = "clouds.png";
            break;
          case "Rain":
            weatherIcon.src = "rain.png";
            break;
          case "Clear":
            weatherIcon.src = "clear.png";
            break;
          case "Drizzle":
            weatherIcon.src = "drizzle.png";
            break;
          case "Mist":
            weatherIcon.src = "mist.png";
            break;
          default:
            weatherIcon.src = "default.png"; // fallback image
        }

        document.querySelector(".weather").style.display = "block";
        document.querySelector(".error").style.display = "none";
      } catch (error) {
        alert("Network error or failed to fetch data.");
        console.error(error);
      }
    }

    // Handle click
    searchbtn.addEventListener("click", () => {
      const city = searchbox.value.trim();
      if (city === "") {
        alert("Please enter a city name.");
        return;
      }
      checkweather(city);
    });

    // Handle Enter key
    searchbox.addEventListener("keyup", (event) => {
      if (event.key === "Enter") {
        const city = searchbox.value.trim();
        if (city === "") {
          alert("Please enter a city name.");
          return;
        }
        checkweather(city);
      }
    });
  </script>
</body>
</html>
